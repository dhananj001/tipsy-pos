<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="tipsy-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" /> <!-- amber-500 -->
      <stop offset="100%" stop-color="#f43f5e" /> <!-- rose-500 -->
    </linearGradient>
  </defs>
  <!-- Background with premium rounded corners -->
  <rect width="512" height="512" rx="128" fill="url(#tipsy-grad)" />
  <!-- Crisp, modern sans-serif "T" in white -->
  <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="280">T</text>
</svg>
